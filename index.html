<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chasqui</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
      #app { width: 100vw; height: 100vh; }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 6px;
        margin: -3px 0 0 -3px;
        border-radius: 50%;
        background: #fff;
        opacity: 0.8;
        pointer-events: none;
      }
      #hint {
        position: fixed;
        bottom: 16px;
        left: 16px;
        color: #fff;
        font: 14px monospace;
        opacity: 0.7;
        pointer-events: none;
      }
      #camaquen-debug {
        position: fixed;
        top: 16px;
        left: 16px;
        color: #ffd700;
        font: 14px monospace;
        opacity: 0.85;
        pointer-events: none;
        white-space: pre;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="crosshair"></div>
    <div id="hint">Clic para bloquear el mouse — WASD mover, espacio saltar, ESC liberar</div>
    <div id="camaquen-debug"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
